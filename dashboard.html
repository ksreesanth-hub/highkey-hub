<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HighKey | Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">
    <header class="dashboard-header">
        <img src="HighKey_Logo.png" alt="HighKey Logo" class="logo-small">
        <button id="logout-btn" class="secondary-btn">Logout</button>
    </header>
    
    <main class="dashboard-main">
        <h1>Your Courses</h1>
        <div class="course-grid">
            
            <!-- Course Card 1: Social Psychology -->
            <div class="course-card" onclick="window.location.href='social-psychology.html'">
                <div class="card-image bg-orange">
                    <h2>SP</h2>
                </div>
                <div class="card-content">
                    <h3>Social Psychology</h3>
                    <p>24VMC203</p>
                    <div class="progress-bar-bg">
                        <!-- We added an ID to the fill -->
                        <div id="sp-progress-fill" class="progress-bar-fill" style="width: 0%;"></div>
                    </div>
                    <!-- We added an ID to the text -->
                    <p id="sp-progress-text" class="progress-text">0% Completed</p>
                </div>
            </div>

        </div>
    </main>

    <!-- Firebase Logic to Calculate Progress & Logout -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDWmgWjv2qPL8_NOyG2dKGfFhV13jhwUfU",
          authDomain: "highkey-hub-937cb.firebaseapp.com",
          projectId: "highkey-hub-937cb",
          storageBucket: "highkey-hub-937cb.firebasestorage.app",
          messagingSenderId: "1037256979554",
          appId: "1:1037256979554:web:04b33851ba444b99ca8d3b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 1. Make the Logout Button Work
        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth).then(() => {
                window.location.href = "index.html"; // Send back to login page
            }).catch((error) => {
                alert("Error logging out: " + error.message);
            });
        });

        // 2. Fetch User Progress and Update the Bar
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docRef = doc(db, "users", user.uid);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    // Get the level (if it doesn't exist yet, default to 1)
                 const level = docSnap.data().sp_level || 1;

                 // Calculate percentage based on the ENTIRE course 
                 // (Assuming 5 units with approx 3 modules each = 15 total modules)
                 const TOTAL_MODULES = 15;
                 const completedModules = level - 1;
                 let percentage = Math.round((completedModules / TOTAL_MODULES) * 100);                    
                    // Cap it at 100 just in case
                    if (percentage > 100) percentage = 100;

                    // Animate the bar and update the text!
                    document.getElementById('sp-progress-fill').style.width = percentage + '%';
                    document.getElementById('sp-progress-text').innerText = percentage + '% Completed';
                }
            } else {
                // If they aren't logged in, kick them back to the login page
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>
