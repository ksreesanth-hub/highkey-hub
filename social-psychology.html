<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Psychology | HighKey</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">
    <header class="dashboard-header">
        <button onclick="window.location.href='dashboard.html'" class="secondary-btn">← Back</button>
        <h2 style="margin:0; font-family:'Comfortaa', sans-serif; color:var(--dark-text);">Social Psychology</h2>
        <div style="width: 80px;"></div>
    </header>

    <main class="path-container">
        <!-- UNIT 1 -->
        <h3 style="text-align: center; color: var(--light-text); margin-bottom: 40px;">Unit 1: Introduction to Social Psychology</h3>

        <div class="node-wrapper"><div class="node active-node" onclick="window.location.href='module-1.html'"><span class="node-icon">🧠</span></div><p class="node-title">Introduction</p></div>
        <div class="path-line" id="line-1"></div>
        <div class="node-wrapper"><div class="node locked-node" id="node-2"><span class="node-icon" id="icon-2">🔒</span></div><p class="node-title" id="title-2" style="color: var(--light-text);">Key Figures</p></div>
        <div class="path-line locked-line" id="line-2"></div>
        <div class="node-wrapper"><div class="node locked-node" id="node-3"><span class="node-icon" id="icon-3">🔒</span></div><p class="node-title" id="title-3" style="color: var(--light-text);">Levels of Analysis</p></div>
        
        <div class="path-line locked-line" id="line-3"></div>

        <!-- UNIT 2 -->
        <h3 style="text-align: center; color: var(--brand-orange); margin: 40px 0;">Unit 2: Social Cognition and Perception</h3>

        <div class="node-wrapper"><div class="node locked-node" id="node-4"><span class="node-icon" id="icon-4">🔒</span></div><p class="node-title" id="title-4" style="color: var(--light-text);">Social Cognition</p></div>
        
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDWmgWjv2qPL8_NOyG2dKGfFhV13jhwUfU",
          authDomain: "highkey-hub-937cb.firebaseapp.com",
          projectId: "highkey-hub-937cb",
          storageBucket: "highkey-hub-937cb.firebasestorage.app",
          messagingSenderId: "1037256979554",
          appId: "1:1037256979554:web:04b33851ba444b99ca8d3b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docRef = doc(db, "users", user.uid);
                const docSnap = await getDoc(docRef);
                
                if (docSnap.exists()) {
                    const level = docSnap.data().sp_level;
                    
                    if (level >= 2) {
                        document.getElementById('node-2').className = "node active-node";
                        document.getElementById('icon-2').innerText = "👥";
                        document.getElementById('title-2').style.color = "#333";
                        document.getElementById('line-1').className = "path-line active-line";
                        document.getElementById('node-2').onclick = () => window.location.href = 'module-2.html';
                    }
                    if (level >= 3) {
                        document.getElementById('node-3').className = "node active-node";
                        document.getElementById('icon-3').innerText = "🔍";
                        document.getElementById('title-3').style.color = "#333";
                        document.getElementById('line-2').className = "path-line active-line";
                        document.getElementById('node-3').onclick = () => window.location.href = 'module-3.html';
                    }
                    // Unlock Unit 2 / Node 4!
                    if (level >= 4) {
                        document.getElementById('node-4').className = "node active-node";
                        document.getElementById('icon-4').innerText = "👁️";
                        document.getElementById('title-4').style.color = "#333";
                        document.getElementById('line-3').className = "path-line active-line";
                        document.getElementById('node-4').onclick = () => window.location.href = 'module-4.html';
                    }
                    
                    // Unlock Node 5
                    if (level >= 5) {
                        document.getElementById('node-5').className = "node active-node";
                        document.getElementById('icon-5').innerText = "👤";
                        document.getElementById('title-5').style.color = "#333";
                        document.getElementById('line-4').className = "path-line active-line";
                        document.getElementById('node-5').onclick = () => window.location.href = 'module-5.html';
                    }
                    
                    // ADD UNLOCK LOGIC FOR NODE 6 HERE
                    if (level >= 6) {
                        document.getElementById('node-6').className = "node active-node";
                        document.getElementById('icon-6').innerText = "🎭";
                        document.getElementById('title-6').style.color = "#333";
                        document.getElementById('line-5').className = "path-line active-line";
                        document.getElementById('node-6').onclick = () => window.location.href = 'module-6.html';
                    }
                }
            }
        });
    </script>
</body>
</html>
