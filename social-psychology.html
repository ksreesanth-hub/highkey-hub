<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Psychology | HighKey</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">
    <header class="dashboard-header">
        <button onclick="window.location.href='dashboard.html'" class="secondary-btn">← Back</button>
        <h2 style="margin:0; font-family:'Comfortaa', sans-serif; color:var(--dark-text);">Social Psychology</h2>
        <div style="width: 80px;"></div>
    </header>

    <main class="path-container">
        <h3 style="text-align: center; color: var(--light-text); margin-bottom: 40px;">Level 1: Foundations of the Social Mind</h3>

        <!-- Node 1: Introduction -->
        <div class="node-wrapper">
            <div class="node active-node" onclick="window.location.href='module-1.html'">
                <span class="node-icon">🧠</span>
            </div>
            <p class="node-title">Introduction</p>
        </div>

        <div class="path-line" id="line-1"></div>

        <!-- Node 2: Key Figures -->
        <div class="node-wrapper">
            <div class="node locked-node" id="node-2">
                <span class="node-icon" id="icon-2">🔒</span>
            </div>
            <p class="node-title" id="title-2" style="color: var(--light-text);">Key Figures</p>
        </div>

        <div class="path-line locked-line" id="line-2"></div>

        <!-- Node 3: Levels of Analysis -->
        <div class="node-wrapper">
            <div class="node locked-node" id="node-3">
                <span class="node-icon" id="icon-3">🔒</span>
            </div>
            <p class="node-title" id="title-3" style="color: var(--light-text);">Levels of Analysis</p>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDWmgWjv2qPL8_NOyG2dKGfFhV13jhwUfU",
          authDomain: "highkey-hub-937cb.firebaseapp.com",
          projectId: "highkey-hub-937cb",
          storageBucket: "highkey-hub-937cb.firebasestorage.app",
          messagingSenderId: "1037256979554",
          appId: "1:1037256979554:web:04b33851ba444b99ca8d3b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docRef = doc(db, "users", user.uid);
                const docSnap = await getDoc(docRef);
                
                if (docSnap.exists()) {
                    const level = docSnap.data().sp_level;
                    
                    // Unlock Node 2
                    if (level >= 2) {
                        const node2 = document.getElementById('node-2');
                        node2.className = "node active-node";
                        document.getElementById('icon-2').innerText = "👥";
                        document.getElementById('title-2').style.color = "#333";
                        document.getElementById('line-1').className = "path-line active-line";
                        node2.onclick = () => window.location.href = 'module-2.html';
                    }
                    
                    // Unlock Node 3
                    if (level >= 3) {
                        const node3 = document.getElementById('node-3');
                        node3.className = "node active-node";
                        document.getElementById('icon-3').innerText = "🔍";
                        document.getElementById('title-3').style.color = "#333";
                        document.getElementById('line-2').className = "path-line active-line";
                        node3.onclick = () => alert("Module 3 coming soon!");
                    }
                }
            }
        });
    </script>
</body>
</html>
