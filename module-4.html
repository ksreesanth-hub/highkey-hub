<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module 4 | HighKey</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">
    <header class="dashboard-header">
        <button onclick="window.location.href='social-psychology.html'" class="secondary-btn">← Exit</button>
        <div class="lesson-progress-bar">
            <div id="progress-fill" class="progress-bar-fill" style="width: 25%;"></div>
        </div>
    </header>

    <main class="flashcard-container">
        <div class="flashcard" id="flashcard">
            <h2 id="card-title" class="card-title">Loading...</h2>
            <p id="card-content" class="card-text" style="font-size: 16px; text-align: left;"></p>
        </div>
        <button id="next-btn" class="primary-btn" style="margin-top: 30px;">Continue</button>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDWmgWjv2qPL8_NOyG2dKGfFhV13jhwUfU",
          authDomain: "highkey-hub-937cb.firebaseapp.com",
          projectId: "highkey-hub-937cb",
          storageBucket: "highkey-hub-937cb.firebasestorage.app",
          messagingSenderId: "1037256979554",
          appId: "1:1037256979554:web:04b33851ba444b99ca8d3b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Unit 2 Content with Embedded Links and Styling
        const lessonData = [
            { 
                title: "What is Social Cognition?", 
                content: "<strong>Definition:</strong> The mental processes involved in perceiving, interpreting, and responding to social information about other people and social situations.<br><br>The goal is to provide mechanistic, process-oriented explanations of complex social phenomena.<br><br><a href='https://www.simplypsychology.org/social-cognition.html' target='_blank' style='color: #F05A28; font-weight: bold;'>📖 External Resource: Read more on SimplyPsychology</a>" 
            },
            { 
                title: "The Core Processes", 
                content: "Social cognition follows a 4-stage perception formation process:<br><br>1. <strong>Social Stimuli:</strong> Gathering information about others.<br>2. <strong>Attention:</strong> Focusing on specific stimuli.<br>3. <strong>Encoding:</strong> Storing information in memory.<br>4. <strong>Retrieval:</strong> Accessing and making sense of the information.<br><br><a href='https://www.youtube.com/results?search_query=social+cognition+psychology' target='_blank' style='color: #F05A28; font-weight: bold;'>📺 Search YouTube: Social Cognition Explanations</a>" 
            },
            { 
                title: "Mental Shortcuts: Heuristics", 
                content: "Heuristics are simple rules the brain uses to make quick decisions without processing every detail. While efficient, they can lead to biases.<br><br>• <strong>Availability:</strong> Judging likelihood based on how easily examples come to mind.<br>• <strong>Representativeness:</strong> Judging based on similarity to a typical example.<br>• <strong>Anchoring:</strong> Relying heavily on the first piece of information received.<br><br><a href='https://thedecisionlab.com/psychology/cognitive/heuristics' target='_blank' style='color: #F05A28; font-weight: bold;'>🧠 Deep Dive: The Decision Lab on Heuristics</a>" 
            },
            { 
                title: "Confirmation Bias", 
                content: "The tendency to look for, remember, and notice information that confirms our existing beliefs. We often ignore or forget information that contradicts what we already think.<br><br><em>Example: An algorithm showing you only news that agrees with your political views.</em><br><br><iframe width='100%' height='200' src='https://www.youtube.com/embed/vka1iInHjHI?si=k9tS-VfLzS_H-Z5j' title='YouTube video player' frameborder='0' allow='accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture' allowfullscreen></iframe>" 
            }
        ];

        let currentCard = 0;
        const cardTitle = document.getElementById('card-title');
        const cardContent = document.getElementById('card-content');
        const nextBtn = document.getElementById('next-btn');
        const progressFill = document.getElementById('progress-fill');

        // Function to load the current card
        function loadCard() {
            cardTitle.innerText = lessonData[currentCard].title;
            // CRUCIAL CHANGE: Using innerHTML instead of innerText so links and videos render!
            cardContent.innerHTML = lessonData[currentCard].content;
            progressFill.style.width = (((currentCard + 1) / lessonData.length) * 100) + '%';
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loadCard(); // Load first card immediately
                
                nextBtn.addEventListener('click', async () => {
                    currentCard++;
                    if (currentCard < lessonData.length) {
                        loadCard();
                    } else {
                        nextBtn.innerText = "Saving...";
                        // Upgrade the student to Level 5 (Starts Node 5)
                        await setDoc(doc(db, "users", user.uid), { sp_level: 5 }, { merge: true });
                        alert("Module Complete! You unlocked The Self & Identity.");
                        window.location.href = "social-psychology.html"; 
                    }
                });
            } else {
                window.location.href = "index.html"; 
            }
        });
    </script>
</body>
</html>
