<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module 4 | HighKey</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">
    <header class="dashboard-header">
        <button onclick="window.location.href='social-psychology.html'" class="secondary-btn">← Exit</button>
        <div class="lesson-progress-bar">
            <div id="progress-fill" class="progress-bar-fill" style="width: 25%;"></div>
        </div>
    </header>

    <main class="flashcard-container">
        <div class="flashcard" id="flashcard">
            <h2 id="card-title" class="card-title">Loading...</h2>
            <p id="card-content" class="card-text" style="font-size: 16px; text-align: left;"></p>
        </div>
        <button id="next-btn" class="primary-btn" style="margin-top: 30px;">Continue</button>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDWmgWjv2qPL8_NOyG2dKGfFhV13jhwUfU",
          authDomain: "highkey-hub-937cb.firebaseapp.com",
          projectId: "highkey-hub-937cb",
          storageBucket: "highkey-hub-937cb.firebasestorage.app",
          messagingSenderId: "1037256979554",
          appId: "1:1037256979554:web:04b33851ba444b99ca8d3b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Unit 2 Content purely from Unit 2.pptx
        const lessonData = [
            { 
                title: "What is Social Cognition?", 
                content: "<strong>Definition:</strong> The mental processes involved in perceiving, interpreting, and responding to social information about other people and social situations.<br><br><strong>Core Domains:</strong><br>• Social perception (processing faces, expressions and social cues)<br>• Social understanding (Theory of mind and inferring intentions/beliefs)<br>• Social decision-making" 
            },
            { 
                title: "Basic Processes", 
                content: "Social cognition relies on four basic processes:<br><br>1. <strong>Attention</strong><br>2. <strong>Interpretation</strong><br>3. <strong>Memory</strong><br>4. <strong>Judgement</strong>" 
            },
            { 
                title: "Heuristics in Social Cognition", 
                content: "Heuristics are mental shortcuts or simple rules the brain uses to make quick decisions without processing every detail.<br><br>• <strong>Availability:</strong> Estimating likelihood based on how easily examples come to mind.<br>• <strong>Representativeness:</strong> Judging based on similarity to a typical example.<br>• <strong>Anchoring:</strong> Relying heavily on the first piece of information received." 
            },
            { 
                title: "Biases Related to Heuristics", 
                content: "<strong>Confirmation Bias:</strong> The tendency to look for, remember, and notice information that confirms our existing beliefs. We often ignore information that contradicts what we already think.<br><br><strong>Availability Heuristic Bias:</strong> Making judgments based on how easily examples come to mind. If something is recent, dramatic, or memorable, we often overestimate its importance." 
            }
        ];

        let currentCard = 0;
        const cardTitle = document.getElementById('card-title');
        const cardContent = document.getElementById('card-content');
        const nextBtn = document.getElementById('next-btn');
        const progressFill = document.getElementById('progress-fill');

        function loadCard() {
            cardTitle.innerText = lessonData[currentCard].title;
            cardContent.innerHTML = lessonData[currentCard].content;
            progressFill.style.width = (((currentCard + 1) / lessonData.length) * 100) + '%';
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loadCard(); 
                
                nextBtn.addEventListener('click', async () => {
                    currentCard++;
                    if (currentCard < lessonData.length) {
                        loadCard();
                    } else {
                        nextBtn.innerText = "Saving...";
                        await setDoc(doc(db, "users", user.uid), { sp_level: 5 }, { merge: true });
                        alert("Module Complete! You unlocked The Self & Identity.");
                        window.location.href = "social-psychology.html"; 
                    }
                });
            } else {
                window.location.href = "index.html"; 
            }
        });
    </script>
</body>
</html>
