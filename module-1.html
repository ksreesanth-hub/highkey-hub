<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module 1 | HighKey</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">
    <header class="dashboard-header">
        <button onclick="window.location.href='social-psychology.html'" class="secondary-btn">← Exit</button>
        <div class="lesson-progress-bar">
            <div id="progress-fill" class="progress-bar-fill" style="width: 25%;"></div>
        </div>
    </header>

    <main class="flashcard-container">
        <div class="flashcard" id="flashcard">
            <h2 id="card-title" class="card-title">What is Social Psychology?</h2>
            <p id="card-content" class="card-text">It is the scientific study of how people's thoughts, feelings, and behaviors are influenced by the actual, imagined, or implied presence of others.</p>
        </div>
        <button id="next-btn" class="primary-btn" style="margin-top: 30px;">Continue</button>
    </main>

    <script type="module">
        // 1. Import Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // 2. Your Magic Keys
        const firebaseConfig = {
          apiKey: "AIzaSyDWmgWjv2qPL8_NOyG2dKGfFhV13jhwUfU",
          authDomain: "highkey-hub-937cb.firebaseapp.com",
          projectId: "highkey-hub-937cb",
          storageBucket: "highkey-hub-937cb.firebasestorage.app",
          messagingSenderId: "1037256979554",
          appId: "1:1037256979554:web:04b33851ba444b99ca8d3b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 3. Lesson Data
        const lessonData = [
            { title: "The Core Definition", content: "Social psychology is the scientific study of how people's thoughts, feelings, and behaviors are influenced by the actual, imagined, or implied presence of others." },
            { title: "Nature & Scope", content: "It relies on empirical research and the experimental method, bridging the gap between individual psychology (the brain) and sociology (society at large)." },
            { title: "Philosophical Roots", content: "Long before modern experiments, philosophers like Aristotle and Plato debated human behavior and group dynamics, laying the groundwork for how we understand society today." },
            { title: "Knowledge Check!", content: "Is Social Psychology just 'common sense' or is it a scientific discipline based on empirical data? (Say the answer out loud!)" }
        ];

        let currentCard = 0;
        const cardTitle = document.getElementById('card-title');
        const cardContent = document.getElementById('card-content');
        const nextBtn = document.getElementById('next-btn');
        const progressFill = document.getElementById('progress-fill');

        // 4. Check if user is logged in, then run the card logic
        onAuthStateChanged(auth, (user) => {
            if (user) {
                nextBtn.addEventListener('click', async () => {
                    currentCard++;
                    if (currentCard < lessonData.length) {
                        cardTitle.innerText = lessonData[currentCard].title;
                        cardContent.innerText = lessonData[currentCard].content;
                        progressFill.style.width = (((currentCard + 1) / lessonData.length) * 100) + '%';
                    } else {
                        // Level Complete: Save to Database!
                        nextBtn.innerText = "Saving...";
                        await setDoc(doc(db, "users", user.uid), { sp_level: 2 }, { merge: true });
                        alert("Level Complete! You unlocked the next node.");
                        window.location.href = "social-psychology.html"; 
                    }
                });
            } else {
                window.location.href = "index.html"; // Send to login if not authenticated
            }
        });
    </script>
</body>
</html>
